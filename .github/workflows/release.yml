name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release 版本号，例如 v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-24.04
            archive_name: ipmi-fan-control-linux-x86_64.tar.gz
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            archive_name: ipmi-fan-control-linux-arm64.tar.gz

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libyaml-cpp-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Prepare package
        run: |
          mkdir -p package
          cp build/ipmi-fan-control package/
          cp examples/config.example.yaml package/
          cp etc/systemd/system/ipmi-fan-control.service.example package/
          cp README.md package/
          cp LICENSE package/
          tar -C package -czf ${{ matrix.archive_name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate checksums
        run: |
          find release-assets -type f -name "*.tar.gz" -print0 | while IFS= read -r -d '' file; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
